<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyToDoList</title>
    <link rel="stylesheet" type="text/css" href="../node_modules/font-awesome/css/font-awesome.css">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.6.3/css/all.css">
    <link rel="stylesheet" href="Mycss.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet">
      <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Sofia&effect=fire">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
</head>

<body>
<div class="Container">
        <h2 class="font-effect-fire">My To Do List</h2>
        <input type="text" id="TodoList" placeholder="Title...">
        <div class="add" style="display: inline;"> <i class=" material-icons" id="plus">add</i> </div>
      <ul id="myUL">
      </ul>
    </div>
<script>
    var regTODO=/^[a-zA-Z0-9]+$/i;
    $(document).ready(function(){
  $("#plus").click(function(){

        var text=$('#TodoList').val();
        if(regTODO.test(text))
        $('ul').append('<li>'+text+'<i class="fas fa-check"> </i> <i class="fas fa-trash"></i></li>');
        else {
        if(text=='') alert("the tiltle cannot be  null");
        else alert("please only those characters which are available:  a-z A-Z 0-9 ");
        }
        $('#TodoList').val('');
    })
    $('ul').on('click','.fa-trash',function(){
        $(this).parent('li').fadeOut(500);
    });

    $('ul').on('click','.fa-check',function(){
        $(this).parent('li').toggleClass('checked');
    });


    })

      
</script>
</body>
</html>
